<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Done Yet? YouTube thumbnail</title>
    <style>
      :root { color-scheme: only light; }
      * { box-sizing: border-box; }
      html, body { width: 1280px; height: 720px; margin: 0; overflow: hidden; }
      body {
        background: #edf1f2;
        color: #172126;
        font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .canvas { position: relative; width: 1280px; height: 720px; overflow: hidden; }
      .product {
        position: absolute;
        inset: -18px -90px -18px 410px;
        width: 1000px;
        height: 756px;
        object-fit: cover;
        object-position: 18% top;
        filter: saturate(.95) contrast(1.02);
      }
      .copy {
        position: absolute;
        inset: 0 auto 0 0;
        width: 520px;
        padding: 54px 46px 46px 58px;
        background: #ffffff;
        color: #172126;
        border-right: 1px solid #cfd7da;
      }
      .wordmark { display: flex; align-items: center; gap: 13px; font-size: 25px; font-weight: 780; }
      .mark {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border: 2px solid #172126;
        border-radius: 6px;
        font-size: 22px;
        font-weight: 850;
      }
      .eyebrow { margin-top: 58px; color: #627078; font-size: 18px; font-weight: 720; text-transform: uppercase; }
      h1 { margin: 12px 0 0; font-size: 65px; line-height: 1.01; letter-spacing: 0; }
      h1 span { color: #d33b32; }
      .rule { width: 86px; height: 8px; margin-top: 28px; background: #1266d2; }
      .verdict {
        position: absolute;
        left: 58px;
        bottom: 54px;
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .badge { padding: 10px 14px; border: 2px solid #d33b32; border-radius: 5px; color: #b82c25; font-size: 21px; font-weight: 820; }
      .caption { color: #4e5b61; font-size: 17px; font-weight: 650; }
      .proof {
        position: absolute;
        right: 30px;
        bottom: 28px;
        padding: 9px 12px;
        background: rgb(255 255 255 / 94%);
        border: 1px solid #cfd7da;
        border-radius: 4px;
        color: #344148;
        font-size: 16px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="canvas">
      <img class="product" src="../../docs/design/renders/done-yet-console-desktop-1440-full.png" alt="Done Yet console" />
      <section class="copy">
        <div class="wordmark"><span class="mark">&#10003;</span>Done Yet?</div>
        <div class="eyebrow">Postcondition verifier</div>
        <h1>Agent said<br />done.<br />Systems said<br /><span>FAIL.</span></h1>
        <div class="rule"></div>
        <div class="verdict">
          <div class="badge">FAIL 9 / 11</div>
          <div class="caption">Two missed outcomes</div>
        </div>
      </section>
      <div class="proof">Inspect the evidence, not the confidence.</div>
    </main>
  </body>
</html>
